<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f4f1ec">
<title>SNAKE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="snake.css">
</head>
<body>
<div id="root">
  <!-- ── Header ── -->
  <div id="hdr">
    <div id="logo">snake</div>
    <div id="hdr-right">
      pontuação
      <span id="score-live">00</span>
    </div>
  </div>

  <!-- ── Stats bar ── -->
  <div id="stats">
    <div class="stat-cell">
      streak
      <span class="stat-val" id="st-streak">0</span>
    </div>
    <div class="stat-cell">
      combo
      <span class="stat-val" id="st-combo" data-level="low">×1</span>
    </div>
    <div class="stat-cell">
      recorde
      <span class="stat-val" id="st-best">0</span>
    </div>
  </div>

  <!-- ── Mode selector ── -->
  <div id="mode-row">
    <button class="mode-btn active" data-mode="classic">clássico</button>
    <button class="mode-btn"        data-mode="wrap">portal</button>
    <button class="mode-btn"        data-mode="speed">veloz</button>
    <button class="mode-btn"        data-mode="challenge">desafio</button>
  </div>

  <!-- ── Level info bar (challenge only) ── -->
  <div id="level-bar" style="display:none">
    <span id="level-label">fase 1</span>
    <span id="level-prog-wrap">
      <span id="level-progress">0</span>/<span id="level-target">5</span>
    </span>
  </div>

  <!-- ── Arena ── -->
  <div id="arena">
    <canvas id="c"></canvas>
    <div id="combo-popup"></div>

    <!-- Main overlay -->
    <div id="overlay" data-phase="menu">
      <span id="ov-label">snake</span>
      <span id="ov-score">—</span>
      <span id="ov-sub"></span>
      <span id="ov-best" style="display:none"></span>
      <span id="ov-level-badge" style="display:none"></span>
      <button id="play-btn">jogar</button>
      <div id="overlay-actions">
        <button id="levels-btn">fases</button>
        <button id="stats-btn">estatísticas</button>
      </div>
    </div>
  </div>
<div id="hdr-right">
      <div style="display: flex; align-items: center; gap: var(--sp-4);">
        <button id="sound-btn" class="icon-btn" aria-label="Alternar Som">
          <svg id="icon-sound-off" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
          </svg>
          <svg id="icon-sound-on" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        </button>
        <div>
          pontuação
          <span id="score-live">00</span>
        </div>
      </div>
    </div>
  <!-- ── Power-up bar ── -->
  <div id="pw-bar"><div id="pw-fill"></div></div>

  <!-- ── Timer bar (challenge mode) ── -->
  <div id="timer-bar" style="display:none"><div id="timer-fill"></div></div>

  <!-- ── D-Pad ── -->
  <div id="dpad">
    <button class="dpad-btn dpad-up" data-d="UP">↑</button>
    <button class="dpad-btn dpad-l"  data-d="LEFT">←</button>
    <button class="dpad-btn dpad-d"  data-d="DOWN">↓</button>
    <button class="dpad-btn dpad-r"  data-d="RIGHT">→</button>
  </div>

  <div id="foot">setas / wasd · swipe · espaço para pausar</div>

</div><!-- #root -->

<!-- ── Level select panel ── -->
<div id="level-panel" class="panel hidden">
  <div class="panel-header">
    <span id="level-mode-label">modo desafio</span>
    <button id="level-back">✕</button>
  </div>
  <div id="level-grid"></div>
</div>

<!-- ── Stats panel ── -->
<div id="stats-panel" class="panel hidden">
  <div class="panel-header">
    <span>estatísticas</span>
    <button id="stats-back">✕</button>
  </div>
  <div class="stats-list">
    <div class="stats-row">
      <span class="stats-label">partidas jogadas</span>
      <span class="stats-val" id="stat-games">0</span>
    </div>
    <div class="stats-row">
      <span class="stats-label">pontuação total</span>
      <span class="stats-val" id="stat-total-score">0</span>
    </div>
    <div class="stats-row">
      <span class="stats-label">comidas totais</span>
      <span class="stats-val" id="stat-total-food">0</span>
    </div>
    <div class="stats-row">
      <span class="stats-label">melhor combo</span>
      <span class="stats-val" id="stat-best-combo">×0</span>
    </div>
    <div class="stats-row">
      <span class="stats-label">tempo jogado</span>
      <span class="stats-val" id="stat-play-time">0m 0s</span>
    </div>
  </div>
</div>

<!-- Scripts (order matters — config first, then engine, renderer, ui, main) -->
<script src="snake.config.js"></script>
<script src="snake.renderer.js"></script>
<script src="snake.engine.js"></script>
<script src="snake.ui.js"></script>
<script src="snake.js"></script>
</body>
</html>
