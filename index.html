<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f4f1ec">
  <title>Snake Dimen6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="snake.css">
  <link rel="icon" href="data:,">
</head>
<body>

  <div id="root">

    <!-- ── Coluna do jogo ────────────────────────────── -->
    <div id="game-col">

      <header id="hdr">
        <div id="logo">snake</div>
        <div id="hdr-right">
          <button id="sound-btn" class="icon-btn" aria-label="Som">
            <svg id="icon-sound-off" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <line x1="23" y1="9" x2="17" y2="15"/>
              <line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
            <svg id="icon-sound-on" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" class="hidden">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
          <div id="score-wrap">
            <span id="score-label">pts</span>
            <span id="score-live">00</span>
          </div>
        </div>
      </header>

      <div id="stats">
        <div class="stat-cell"><span class="stat-label">streak</span><span class="stat-val" id="st-streak">0</span></div>
        <div class="stat-cell"><span class="stat-label">combo</span><span class="stat-val" id="st-combo">×1</span></div>
        <div class="stat-cell"><span class="stat-label">recorde</span><span class="stat-val" id="st-best">0</span></div>
      </div>

      <div id="mode-row">
        <button class="mode-btn active" data-mode="classic">clássico</button>
        <button class="mode-btn" data-mode="wrap">portal</button>
        <button class="mode-btn" data-mode="speed">veloz</button>
        <button class="mode-btn" data-mode="challenge">desafio</button>
      </div>

      <div id="level-bar" class="hidden">
        <span id="level-label">fase 1</span>
        <span id="level-prog-wrap">
          <span id="level-progress">0</span>/<span id="level-target">5</span>
        </span>
      </div>

      <div id="arena">
        <canvas id="c"></canvas>
        <div id="combo-popup"></div>

        <div id="overlay" data-phase="menu">
          <span id="ov-label">snake</span>
          <span id="ov-score">—</span>
          <span id="ov-sub"></span>
          <span id="ov-best" class="hidden"></span>
          <span id="ov-level-badge" class="hidden"></span>
          <button id="play-btn">iniciar</button>
          <div id="overlay-actions">
            <button id="levels-btn">fases</button>
            <button id="stats-btn">dados</button>
          </div>
        </div>
      </div>

      <div id="pw-bar"><div id="pw-fill"></div></div>
      <div id="timer-bar" style="display:none"><div id="timer-fill"></div></div>

      <div id="dpad">
        <button class="dpad-btn dpad-up"  data-d="UP"    aria-label="Cima">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
        <button class="dpad-btn dpad-l"   data-d="LEFT"  aria-label="Esquerda">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <button class="dpad-btn dpad-d"   data-d="DOWN"  aria-label="Baixo">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
        </button>
        <button class="dpad-btn dpad-r"   data-d="RIGHT" aria-label="Direita">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>

    </div><!-- /game-col -->

    <!-- ── Coluna direita (rank + aparência + eventos) ── -->
    <div id="right-col" style="width:180px">

      <!-- Ranking -->
      <aside id="side-rank" class="hidden">
        <div class="rank-header">
          <span>operadores</span>
          <button id="rank-refresh-side" aria-label="Atualizar ranking">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5">
              <polyline points="23 4 23 10 17 10"/>
              <polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
        </div>
        <div id="rank-list-side" class="rank-list"></div>
      </aside>

      <!-- Aparência da cobra -->
      <div id="skin-panel">
        <div class="skin-header">
          <span>aparência</span>
          <button id="skin-toggle" class="icon-btn" aria-label="Expandir">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
        </div>
        <div id="skin-body" class="hidden">
          <!-- Preview da cobra -->
          <canvas id="skin-preview" width="160" height="52"></canvas>
          <!-- Cores -->
          <div class="skin-section-label">cor</div>
          <div id="color-grid"></div>
          <!-- Skins -->
          <div class="skin-section-label">forma</div>
          <div id="skin-grid-wrap">
            <div id="skin-grid"></div>
          </div>
        </div>
      </div>

      <!-- Aviso de evento forçado (500pts) — fora do mapa -->
      <div id="forced-event" class="hidden">
        <div class="fe-icon">½S</div>
        <div class="fe-text"></div>
      </div>

    </div><!-- /right-col -->

  </div><!-- /root -->

  <!-- ── Login ────────────────────────────────────────── -->
  <div id="login-panel" class="panel auth-panel">
    <div class="login-box">
      <span class="login-title">snake dimen6</span>
      <span class="login-sub">Crie um apelido para o ranking global.</span>
      <div class="input-group">
        <input type="text" id="player-nick-input" placeholder="NICKNAME" autocomplete="off" maxlength="12">
      </div>
      <button id="login-btn">
        <span class="btn-text">entrar</span>
        <svg class="loader-svg" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5">
          <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Painel de fases ──────────────────────────────── -->
  <div id="level-panel" class="panel hidden">
    <div class="panel-header">
      <span>modo desafio</span>
      <button id="level-back" aria-label="Fechar">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="level-grid"></div>
  </div>

  <!-- ── Painel de stats ──────────────────────────────── -->
  <div id="stats-panel" class="panel hidden">
    <div class="panel-header">
      <span>estatísticas</span>
      <button id="stats-back" aria-label="Fechar">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="stats-list">
      <div class="stats-row"><span>partidas</span><span id="stat-games">0</span></div>
      <div class="stats-row"><span>pontuação total</span><span id="stat-total-score">0</span></div>
      <div class="stats-row"><span>comidas totais</span><span id="stat-total-food">0</span></div>
      <div class="stats-row"><span>melhor combo</span><span id="stat-best-combo">×0</span></div>
      <div class="stats-row"><span>tempo jogado</span><span id="stat-play-time">0m 0s</span></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
